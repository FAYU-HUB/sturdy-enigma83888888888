<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparansi Gambar 0.3</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #fdfdfd; }
        .box { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); max-width: 500px; width: 100%; text-align: center; border: 1px solid #eee; }
        input[type="file"] { margin: 20px 0; width: 100%; }
        button { background: #333; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #000; }
        #resultContainer { margin-top: 25px; display: none; }
        img { max-width: 100%; border-radius: 8px; background: url('https://www.transparenttextures.com/patterns/checkerboard.png'); }
        canvas { display: none; }
        .dl-btn { background: #2563eb; margin-top: 15px; text-decoration: none; display: inline-block; padding: 10px 20px; color: white; border-radius: 6px; width: 92%; }
    </style>
</head>
<body>

<div class="box">
    <h2>Ubah Transparansi Gambar</h2>
    <p>Masukkan foto untuk diubah menjadi transparansi 0.3</p>
    
    <input type="file" id="imgFile" accept="image/*">
    <button id="process">Proses Sekarang</button>

    <div id="resultContainer">
        <p>Preview (Latar Belakang Kotak-kotak Menunjukkan Transparansi):</p>
        <img id="outImg">
        <a id="dlLink" class="dl-btn">Download Gambar Transparan</a>
    </div>
</div>

<canvas id="cvs"></canvas>

<script>
    const imgFile = document.getElementById('imgFile');
    const process = document.getElementById('process');
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    const outImg = document.getElementById('outImg');
    const resultContainer = document.getElementById('resultContainer');
    const dlLink = document.getElementById('dlLink');

    process.addEventListener('click', () => {
        if (!imgFile.files[0]) {
            alert('Silakan pilih foto!');
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                cvs.width = img.width;
                cvs.height = img.height;

                ctx.clearRect(0, 0, cvs.width, cvs.height);

                ctx.globalAlpha = 10;
                
                ctx.drawImage(img, 0, 0);

                const dataUrl = cvs.toDataURL('image/png');
                outImg.src = dataUrl;
                dlLink.href = dataUrl;
                dlLink.download = "no_ez.png";
                
                resultContainer.style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(imgFile.files[0]);
    });
</script>

</body>
</html>
