<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Watermark Overlay (0.3 Transparency)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #e0f2f1; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #00796b; }
        input[type="file"] { width: 100%; padding: 8px; border: 1px solid #b2dfdb; border-radius: 5px; background: #f1f8f9; }
        button { background: #00897b; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; transition: background 0.3s; }
        button:hover { background: #00695c; }
        #previewContainer { margin-top: 30px; border-top: 2px solid #b2dfdb; padding-top: 20px; display: none; }
        img { max-width: 100%; height: auto; border-radius: 10px; border: 2px solid #ddd; }
        canvas { display: none; }
        .download-btn { background: #ff6f00; margin-top: 20px; display: inline-block; text-decoration: none; width: auto; padding: 10px 30px; border-radius: 30px; color: white; }
        .download-btn:hover { background: #e65100; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tempel Gambar (Watermark) 0.3</h2>
    <p>Upload foto utama dan foto angka '70' Anda.</p>
    
    <div class="input-group">
        <label>1. Pilih Foto Utama:</label>
        <input type="file" id="mainImageInput" accept="image/*">
    </div>

    <div class="input-group">
        <label>2. Pilih Foto "70" (Overlay):</label>
        <input type="file" id="overlayImageInput" accept="image/*">
    </div>
    
    <button id="btnProses">Proses Gambar</button>

    <div id="previewContainer">
        <h3>Preview Hasil:</h3>
        <img id="resultImage">
        <br>
        <a id="downloadLink" class="download-btn">Download Hasil PNG</a>
    </div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    const mainImageInput = document.getElementById('mainImageInput');
    const overlayImageInput = document.getElementById('overlayImageInput');
    const btnProses = document.getElementById('btnProses');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const resultImage = document.getElementById('resultImage');
    const previewContainer = document.getElementById('previewContainer');
    const downloadLink = document.getElementById('downloadLink');

    btnProses.addEventListener('click', () => {
        if (!mainImageInput.files[0] || !overlayImageInput.files[0]) {
            alert('Harap pilih KEDUA gambar (foto utama & foto 70)!');
            return;
        }

        const readMain = new FileReader();
        const readOverlay = new FileReader();

        readMain.onload = function(eMain) {
            const imgMain = new Image();
            imgMain.onload = function() {
                
                readOverlay.onload = function(eOverlay) {
                    const imgOverlay = new Image();
                    imgOverlay.onload = function() {
                        canvas.width = imgMain.width;
                        canvas.height = imgMain.height;

                        ctx.drawImage(imgMain, 0, 0);

                        ctx.globalAlpha = 0.3;

                        const ovSize = Math.min(canvas.width, canvas.height) * 0.5;
                        const ovWidth = ovSize;
                        const ovHeight = (imgOverlay.height / imgOverlay.width) * ovSize;

                        ctx.drawImage(imgOverlay, (canvas.width / 2) - (ovWidth / 2), (canvas.height / 2) - (ovHeight / 2), ovWidth, ovHeight);
                        
                        ctx.globalAlpha = 1.0;

                        const finalDataUrl = canvas.toDataURL('image/png');
                        resultImage.src = finalDataUrl;
                        downloadLink.href = finalDataUrl;
                        downloadLink.download = "foto_gabungan_03.png";
                        
                        previewContainer.style.display = 'block';
                    }
                    imgOverlay.src = eOverlay.target.result;
                }
                readOverlay.readAsDataURL(overlayImageInput.files[0]);
            }
            imgMain.src = eMain.target.result;
        }
        readMain.readAsDataURL(mainImageInput.files[0]);
    });
</script>

</body>
</html>
